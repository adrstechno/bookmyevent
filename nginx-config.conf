# Nginx configuration for GoEventify
# Place in: /etc/nginx/sites-available/goeventify
# Enable: sudo ln -sf /etc/nginx/sites-available/goeventify /etc/nginx/sites-enabled/goeventify
# Test:   sudo nginx -t
# Apply:  sudo systemctl reload nginx

# ── API server ── api.goeventify.com → Node backend
# Backend handles its own CORS — do NOT add CORS headers here (causes duplicate headers)
server {
    listen 80;
    server_name api.goeventify.com;

    location / {
        proxy_pass http://localhost:3232;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Frontend server ── goeventify.com → React dist
server {
    listen 80;
    server_name goeventify.com www.goeventify.com 13.233.131.46;

    root /home/ubuntu/bookmyevent/Frontend/dist;
    index index.html;

    # React Router — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (Vite adds content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
